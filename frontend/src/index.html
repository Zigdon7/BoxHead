<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>BoxHead Remake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #222; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    canvas { display: block; width: 100%; height: 100%; cursor: default; touch-action: none; }
    #ui { display: none; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="scoreDisplay"></div>
  </div>
  <input id="nameInput" type="text" maxlength="16" placeholder="Enter name..."
    style="position:fixed; top:0; left:0; opacity:0; pointer-events:none; width:1px; height:1px;" />
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/main.ts"></script>
</body>
</html>
