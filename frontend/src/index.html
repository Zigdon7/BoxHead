<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>BoxHead Remake</title>
  <style>
    :root {
      --primary: #e53935;
      --primary-glow: rgba(229, 57, 53, 0.6);
      --bg-dark: #0f1015;
      --panel-bg: rgba(20, 22, 30, 0.7);
      --panel-border: rgba(255, 255, 255, 0.1);
      --text-main: #f5f5f5;
      --text-mute: #8b8d96;
      --blue: #1185FE;
      --green: #4caf50;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; color: var(--text-main); }
    canvas { display: block; width: 100%; height: 100%; cursor: default; touch-action: none; position: absolute; top: 0; left: 0; z-index: 1; }
    
    #ui { display: none; }
    
    /* Sleek UI Overlays */
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      transition: opacity 0.3s ease;
    }
    
    .menu-panel {
      background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px;
      padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      width: 90%; max-width: 400px;
      animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulseGlow { 0% { text-shadow: 0 0 10px var(--primary-glow); } 50% { text-shadow: 0 0 25px var(--primary), 0 0 10px var(--primary-glow); } 100% { text-shadow: 0 0 10px var(--primary-glow); } }
    
    h1.logo {
      font-size: 3.5rem; font-weight: 900; letter-spacing: 2px;
      color: var(--primary); margin-bottom: -10px;
      animation: pulseGlow 3s infinite ease-in-out;
      text-transform: uppercase;
    }
    .subtitle { color: var(--text-mute); font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 20px; }

    .input-wrapper { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .input-wrapper label { font-size: 0.85rem; color: var(--text-mute); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    
    input {
      width: 100%; padding: 14px 16px; border-radius: 8px;
      background: rgba(0, 0, 0, 0.3); border: 1px solid var(--panel-border);
      color: #fff; font-size: 1rem; font-family: inherit; transition: all 0.2s ease;
      outline: none;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.2); background: rgba(0,0,0,0.5); }
    input::placeholder { color: rgba(255,255,255,0.3); }

    .auth-box { width: 100%; background: rgba(255,255,255,0.02); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 12px; }
    .auth-box p.title { text-align: center; font-size: 0.9rem; color: var(--text-mute); margin-bottom: 5px; }
    
    .btn {
      width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; border: none; outline: none; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: translateY(2px); }
    
    .btn-play { background: var(--primary); color: white; font-size: 1.25rem; 
      box-shadow: 0 6px 20px rgba(229, 57, 53, 0.4); text-transform: uppercase; letter-spacing: 2px; padding: 16px; margin-top: 10px; }
    .btn-play:hover { background: #f44336; box-shadow: 0 8px 25px rgba(229, 57, 53, 0.6); transform: translateY(-2px); }
    
    .btn-blue { background: var(--blue); color: white; }
    .btn-blue:hover { background: #3b9bff; }
    .btn-white { background: #fff; color: #111; }
    .btn-white:hover { background: #eee; }
    .btn-dark { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-dark:hover { background: rgba(255,255,255,0.15); }

    .divider { display: flex; align-items: center; text-align: center; color: var(--text-mute); font-size: 0.85rem; margin: 5px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--panel-border); }
    .divider span { padding: 0 10px; }

    .info-text { text-align: center; font-size: 0.95rem; color: var(--green); }
    .error-text { text-align: center; font-size: 0.85rem; color: #ff5252; min-height: 16px; }
    
    .controls-hint { margin-top: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.4); text-align: center; }
    
    /* Friends Panel & Game Over */
    #friendsOverlay, #gameOverOverlay { display: none; }
    
    .friends-list { max-height: 200px; overflow-y: auto; width: 100%; }
    .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--panel-border); }
    .friend-item span { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(76,175,80,0.5); }
    
    .btn-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-mute); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
    .btn-close:hover { color: #fff; }
    .btn-icon-red { background: none; border: none; color: #ff5252; cursor: pointer; font-size: 1.2rem; }
    .add-friend-row { display: flex; gap: 8px; margin-top: 15px; }

    .game-over-stats { font-size: 1.5rem; text-align: center; margin-bottom: 20px; color: #fff; }
    .game-over-stats span { color: #ffb400; font-weight: bold; }

    .auth-tabs { display: flex; gap: 4px; width: 100%; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 4px; }
    .auth-tab { flex: 1; padding: 8px; border: none; border-radius: 6px; background: transparent; color: var(--text-mute); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .auth-tab.active { background: rgba(255,255,255,0.1); color: #fff; }
    .auth-tab:hover:not(.active) { color: #ccc; }
    .auth-tab-content { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .auth-tab-content.hidden { display: none; }

    /* Settings */
    #settingsOverlay { display: none; }
    .settings-grid { width: 100%; display: grid; grid-template-columns: 1fr auto; gap: 6px 12px; align-items: center; max-height: 400px; overflow-y: auto; padding-right: 4px; }
    .settings-grid .action-label { font-size: 0.9rem; color: var(--text-mute); }
    .key-btn {
      padding: 6px 14px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; font-weight: 600;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff;
      cursor: pointer; transition: all 0.15s; min-width: 80px; text-align: center; white-space: nowrap;
    }
    .key-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--primary); }
    .key-btn.listening { background: var(--primary); border-color: var(--primary); animation: pulse 0.8s infinite alternate; color: #fff; }
    @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
    .settings-section-title { grid-column: 1 / -1; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .settings-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .settings-toggle { display: flex; align-items: center; gap: 8px; grid-column: 1 / -1; margin-top: 6px; }
    .settings-toggle label { font-size: 0.9rem; color: var(--text-mute); cursor: pointer; }
    .settings-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

    .gear-btn {
      position: absolute; top: 10px; left: 300px; z-index: 5;
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
      color: #aaa; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .gear-btn:hover { background: rgba(0,0,0,0.7); color: #fff; border-color: var(--primary); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="ui"></div>
  
  <canvas id="gameCanvas"></canvas>

  <!-- Main Menu Overlay -->
  <div id="mainMenuOverlay" class="overlay">
    <div class="menu-panel">
      <div style="text-align: center;">
        <h1 class="logo">BOXHEAD</h1>
        <p class="subtitle">Survive the horde</p>
      </div>

      <div class="input-wrapper">
        <label>Player Name</label>
        <input id="nameInput" type="text" maxlength="16" placeholder="Enter name..." />
      </div>

      <!-- Logged Out Auth Box -->
      <div id="authSectionOut" class="auth-box">
        <p class="title">Sign in (optional)</p>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="email">Email</button>
          <button class="auth-tab" data-tab="bsky">Bluesky</button>
          <button class="auth-tab" data-tab="google">Google</button>
        </div>

        <!-- Email tab -->
        <div id="authTabEmail" class="auth-tab-content">
          <input id="emailInput" type="email" maxlength="128" placeholder="you@example.com" />
          <input id="emailPassInput" type="password" maxlength="128" placeholder="Password (min 6 chars)" />
          <div style="display:flex; gap:8px;">
            <button id="emailLoginBtn" class="btn btn-dark" style="flex:1;">Sign In</button>
            <button id="emailRegisterBtn" class="btn btn-blue" style="flex:1;">Register</button>
          </div>
        </div>

        <!-- Bluesky tab -->
        <div id="authTabBsky" class="auth-tab-content hidden">
          <input id="bskyHandleInput" type="text" maxlength="64" placeholder="handle.bsky.social" />
          <input id="bskyPassInput" type="password" maxlength="64" placeholder="App password" />
          <button id="bskyLoginBtn" class="btn btn-blue">Sign in with Bluesky</button>
        </div>

        <!-- Google tab -->
        <div id="authTabGoogle" class="auth-tab-content hidden">
          <button id="googleLoginBtn" class="btn btn-white">
            <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
          </button>
        </div>

        <div id="loginErrorMsg" class="error-text"></div>
      </div>

      <!-- Logged In Auth Box -->
      <div id="authSectionIn" class="auth-box hidden">
        <p id="loggedInStatus" class="info-text">Logged in as @handle</p>
        <button id="friendsBtn" class="btn btn-blue">Friends (0/0)</button>
        <button id="logoutBtn" class="btn btn-dark">Logout</button>
      </div>

      <div style="display:flex; gap:8px; width:100%;">
        <button id="playBtn" class="btn btn-play" style="flex:1;">PLAY</button>
        <button id="menuSettingsBtn" class="btn btn-dark" style="width:50px; font-size:1.4rem; padding:0;">&#9881;</button>
      </div>
    </div>
  </div>

  <!-- Friends Overlay -->
  <div id="friendsOverlay" class="overlay">
    <div class="menu-panel" style="position: relative;">
      <button id="closeFriendsBtn" class="btn-close">&times;</button>
      <h2 style="margin-bottom: 10px;">Friends</h2>
      
      <div id="friendsListContainer" class="friends-list"></div>

      <div class="add-friend-row">
        <input id="addFriendInputEl" type="text" placeholder="friend.bsky.social" />
        <button id="addFriendBtn" class="btn btn-blue" style="width: 80px;">Add</button>
      </div>
      <div id="addFriendErrorMsg" class="error-text"></div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="gameOverOverlay" class="overlay">
    <div class="menu-panel" style="background: rgba(40, 10, 10, 0.85); border-color: rgba(229, 57, 53, 0.3);">
      <h1 class="logo" style="margin-bottom: 20px;">GAME OVER</h1>
      <div class="game-over-stats">
        Wave: <span id="gameOverWave">0</span><br/>
        Score: <span id="gameOverScore">0</span>
      </div>
      <button id="backToMenuBtn" class="btn btn-dark" style="margin-top: 20px; font-size: 1.2rem;">Back to Menu</button>
    </div>
  </div>

  <!-- In-game settings gear -->
  <button id="gameSettingsBtn" class="gear-btn hidden">&#9881;</button>

  <!-- Settings Overlay -->
  <div id="settingsOverlay" class="overlay">
    <div class="menu-panel" style="position: relative; max-width: 480px;">
      <button id="closeSettingsBtn" class="btn-close">&times;</button>
      <h2 style="margin-bottom: 6px;">Settings</h2>

      <div class="settings-toggle">
        <input type="checkbox" id="doubleTapDashToggle" />
        <label for="doubleTapDashToggle">Double-tap direction to dash</label>
      </div>

      <div id="bindingsGrid" class="settings-grid"></div>

      <div style="display:flex; gap:8px; width:100%; margin-top:16px;">
        <button id="resetBindingsBtn" class="btn btn-dark" style="flex:1;">Reset Defaults</button>
        <button id="saveSettingsBtn" class="btn btn-blue" style="flex:1;">Done</button>
      </div>
    </div>
  </div>

  <input id="nameInputH" type="hidden" />

  <script type="module" src="/main.ts"></script>
</body>
</html>
